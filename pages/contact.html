<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact — Baptiste Cadio</title>
    <link rel="stylesheet" href="../css/main.css" />
</head>
<body class="page-contact">
<div id="header"></div>
 <main class="site-main">
 <section class="section-contact">
    <div class="section-inner">

      <header class="section-header">
        <span class="section-label">Contact</span>
        <h2 class="section-header__title">Me contacter</h2>
      </header>

      <div class="contact-card">
        <div class="contact-card__content">
          <form
            id="contactForm"
            class="contact-form"
            action="https://formspree.io/f/mwpgabpn"
            method="POST"
          >
            <!-- Formspree: optionnel pour définir un reply-to -->
            <input type="hidden" name="_subject" value="Nouveau message - Formulaire Contact" />

            <div class="columns is-multiline">
              <div class="column is-6">
                <div class="field">
                  <label class="label">Nom / Prénom</label>
                  <div class="control">
                    <input
                      class="input"
                      type="text"
                      name="name"
                      placeholder="Votre nom"
                      required
                      autocomplete="name"
                    />
                  </div>
                </div>
              </div>

              <div class="column is-6">
                <div class="field">
                  <label class="label">Email</label>
                  <div class="control">
                    <input
                      class="input"
                      type="email"
                      name="email"
                      placeholder="votre@email.com"
                      required
                      autocomplete="email"
                    />
                  </div>
                </div>
              </div>

              <div class="column is-12">
                <div class="field">
                  <label class="label">Sujet</label>
                  <div class="control">
                    <input
                      class="input"
                      type="text"
                      name="subject"
                      placeholder="Sujet du message"
                      required
                    />
                  </div>
                </div>
              </div>

              <div class="column is-12">
                <div class="field">
                  <label class="label">Message</label>
                  <div class="control">
                    <textarea
                      class="textarea"
                      name="message"
                      placeholder="Écrivez votre message…"
                      required
                      rows="6"
                    ></textarea>
                  </div>
                </div>
              </div>

              <div class="column is-12">
                <div class="field">
                  <label class="label">Contact (optionnel)</label>
                  <div class="control">
                    <input
                      class="input"
                      type="text"
                      name="contact"
                      placeholder="Téléphone / autre moyen de vous joindre"
                      autocomplete="tel"
                    />
                  </div>
                </div>
              </div>

              <div class="column is-12">
                <div class="contact-form__actions">
                  <button type="submit" class="button is-primary contact-form__submit">
                    Envoyer
                  </button>

                  <p id="formStatus" class="contact-form__status" aria-live="polite"></p>
                </div>
              </div>
            </div>
          </form>

          <hr class="contact-card__divider" />

          <div class="contact-cv">
            <span class="contact-meta__label">Curriculum Vitæ</span>
            <div class="contact-cv__actions">
              <a href="../images/CV_CADIO_BAPTISTE.pdf" target="_blank" rel="noopener" class="btn btn--outline">Aperçu</a>
              <a href="../images/CV_CADIO_BAPTISTE.pdf" download="CV_Baptiste_Cadio.pdf" class="btn btn--primary">Télécharger</a>
            </div>
          </div>

          <hr class="contact-card__divider" />

          <div class="contact-meta">
            <div class="contact-meta__item">
              <span class="contact-meta__label">Email</span>
              <a class="contact-meta__link" href="mailto:ton@email.com">cadio.baptiste@gmail.com</a>
            </div>

            <div class="contact-meta__item">
              <span class="contact-meta__label">Téléphone</span>
              <a class="contact-meta__link" href="tel:+33123456789">+33 7 89 42 85 97</a>
            </div>

            <div class="contact-meta__item">
              <span class="contact-meta__label">Réseaux</span>
              <div class="contact-meta__socials">
                <a class="contact-meta__chip" href="https://www.instagram.com/baptcad/" target="_blank" rel="noreferrer">
                  Instagram
                </a>
                <a class="contact-meta__chip" href="https://www.linkedin.com/in/baptiste-cadio-754598264/" target="_blank" rel="noreferrer">
                  LinkedIn
                </a>
              </div>
            </div>
          </div>

        </div>
      </div>
    </div>
  </section>
</main>

<div id="footer" data-partial-path="../partials/footer.html"></div>

<script src="../js/main.js"></script>
</body>
</html>
